[project]
name = "mcp_fmi_ecc26"
version = "0.1.0"
description = "Experiment method and results for MCP-FMI  ECC26 paper."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fmpy>=0.3.26",
    "matplotlib>=3.10.7",
    "numpy>=2.3.3",
    "pydantic>=2.12.0",
    "pytest>=8.4.2",
    "pytest-asyncio>=1.2.0",
    "scipy>=1.16.2",
    "typer>=0.12.0",
]

[project.scripts]
ecc26 = "mcp_fmi_ecc26.cli:app"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

